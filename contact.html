<!DOCTYPE html>

<html lang="es">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>SALVADORRUIZ — Contact</title>

    <style>
        @font-face {
            font-family: "Lilex";
            src: url("fonts/Lilex-Regular.ttf") format("truetype");
            font-weight: 400;
            font-style: normal;
            font-display: swap;
        }

        @font-face {
            font-family: "HK Grotesk";
            src: url("fonts/hk-grotesk.medium-legacy.otf") format("opentype");
            font-weight: 500;
            font-style: normal;
            font-display: swap;
        }

        :root {
            --text-dark: #000000;
            --border-color: #000000;
            --main-font: "Lilex", "Inter", "Helvetica Neue", Helvetica, Arial, sans-serif;
            --container-bg: #ffffff;
            --link-blue: #0066ff;
        }



        * {

            margin: 0;

            padding: 0;

            box-sizing: border-box;

           

            font-family: var(--main-font);

            -webkit-font-smoothing: antialiased;

            -moz-osx-font-smoothing: grayscale;

        }



        body {

            background-color: #000;

            background-image: url('assets/FONDOSKYPEROOM/FONDOSKYPEROOM.png');

            background-size: cover;

            background-position: center;

            background-repeat: no-repeat;

            color: var(--text-dark);

            display: flex;

            justify-content: center;

            align-items: center;

            min-height: 100vh;

            padding: 40px 20px;

            position: relative;

        }



        .video-bg {

            position: fixed;

            top: 0;

            left: 0;

            width: 100vw;

            height: 100vh;

            z-index: -1;

            overflow: hidden;

        }



        .video-bg__media {

            position: absolute;

            top: 0;

            left: 0;

            width: 100%;

            height: 100%;

            object-fit: cover;

            animation: zoomSlow 20s infinite alternate ease-in-out;

            background-color: #f0f0f0; /* Fallback color */

        }



        .video-bg__overlay {

            position: absolute;

            top: 0;

            left: 0;

            width: 100%;

            height: 100%;

            background: rgba(0, 0, 0, 0.3);

            pointer-events: none;

        }



        @keyframes zoomSlow {

            from {

                transform: scale(1);

            }

            to {

                transform: scale(1.1);

            }

        }



        .content-canvas {
            background: var(--container-bg);
            border: 1px solid var(--border-color);
            border-radius: 4px;
            padding: 34px 28px;
            width: min(100%, 640px);
            box-shadow: 0 18px 60px rgba(0, 0, 0, 0.08);
            position: relative;
            z-index: 1;
        }



        .page-header {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 24px;
            margin-bottom: 32px;
        }



        .page-logo {
            width: min(100%, 100%);
            max-width: 380px;
            height: auto;
            display: block;
            object-fit: contain;
        }



        .nav-links {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
            gap: 22px;
            width: 100%;
            border-top: 1px solid var(--border-color);
            padding-top: 18px;
        }

        .nav-links a,
        .nav-links .current-page {
            font-family: "HK Grotesk", Arial, sans-serif;
            font-size: 13px;
            font-weight: 500;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            text-decoration: none;
            color: var(--text-dark);
        }

        .nav-links a:hover {
            color: var(--link-blue);
        }

        .nav-close {
            margin-left: auto;
        }

        .current-page {
            opacity: 0.8;
        }

        .contact-content {
            display: grid;
            gap: 18px;
        }

        .contact-content h3 {
            font-size: clamp(2rem, 4vw, 3rem);
            line-height: 0.95;
            letter-spacing: -0.04em;
        }

        .contact-content p {
            font-size: 1rem;
            line-height: 1.6;
        }

        .contact-content p + p {
            margin-top: 10px;
        }

        .cv-link {
            display: inline-block;
            margin-top: 16px;
            font-size: 1rem;
            color: var(--link-blue);
            text-decoration: underline;
            font-weight: 600;
        }

        .cv-link:hover {
            opacity: 0.85;
        }

        @media (max-width: 520px) {
            body {
                padding: 24px 16px;
            }
            .content-canvas {
                padding: 26px 20px;
            }
            .nav-links {
                gap: 14px;
            }
            .nav-links a,
            .nav-links .current-page {
                font-size: 13px;
            }
            .page-header {
                gap: 18px;
            }
        }

    </style>

   



   

</head>

<body>

    <div class="video-bg" aria-hidden="true">
        <video class="video-bg__media" preload="metadata" muted playsinline autoplay loop>
            <source src="assets/FONDO_CONTANT_ME/bubbles.webm" type="video/webm">
            <source src="assets/FONDO_CONTANT_ME/Bubbles.mp4" type="video/mp4">
        </video>
        <div class="video-bg__overlay"></div>
    </div>

    <div class="content-canvas">

       

        <div class="page-header">
            <img class="page-logo" src="assets/NOMBRE_PRINCIPAL_WEB/NOMBRE_INTRO.png" alt="SALVADORRUIZ">
            <div class="nav-links">
                <a href="work.html">Work</a>
                <a href="about.html">About</a>
                <a href="ysa.html">YSA</a>
                <span class="current-page">Contact</span>
                <a class="nav-close" href="PAGINA_WEB.html">Close</a>
            </div>
        </div>

        <div class="contact-content">
            <h3>Contact</h3>
            <div style="display: flex; flex-direction: column; gap: 4px;">
                <p>@YoungSpanishArtist (ig)</p>
                <p>contactoysa@gmail.com</p>
            </div>
            <a class="cv-link" href="assets/IMPORTANTE_CV/CV_Salvador_Ruiz.pdf" download="CV_Salvador_Ruiz.pdf">Download my CV!</a>
            <p style="font-family: 'Lilex', monospace; font-size: 0.85rem; letter-spacing: 0.06em; color: #666; margin-top: 4px;">Granada, Spain</p>
        </div>

    </div>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const video = document.querySelector('.video-bg__media');
            if (!video) return;

            const isMobile = window.matchMedia('(max-width: 768px)').matches;
            const intensity = isMobile ? 0.5 : 1;

            let mouseX = 0, mouseY = 0, currentX = 0, currentY = 0;
            const maxOffset = 20 * intensity;
            const lerpFactor = 0.05;

            function lerp(start, end, factor) { return start + (end - start) * factor; }

            function animate() {
                currentX = lerp(currentX, mouseX, lerpFactor);
                currentY = lerp(currentY, mouseY, lerpFactor);
                video.style.transform = `translate(${currentX}px, ${currentY}px) scale(1.05)`;
                requestAnimationFrame(animate);
            }

            window.addEventListener('mousemove', function(event) {
                const centerX = window.innerWidth / 2;
                const centerY = window.innerHeight / 2;
                const deltaX = (event.clientX - centerX) / centerX;
                const deltaY = (event.clientY - centerY) / centerY;
                mouseX = Math.max(-maxOffset, Math.min(maxOffset, deltaX * maxOffset));
                mouseY = Math.max(-maxOffset, Math.min(maxOffset, deltaY * maxOffset));
            });

            video.style.transition = 'transform 1s ease-out';
            setTimeout(() => { video.style.transition = ''; animate(); }, 1000);
        });
    </script>

</body>

</html>
